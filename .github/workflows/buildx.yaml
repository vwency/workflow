name: Build image with buildx

on:
  workflow_call:
    inputs:
      image-name:
        description: "The name of the image to build"
        required: true
        type: string
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
    secrets:
      personal_access_token:
        required: true

jobs:
  ghcr-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.personal_access_token }}

      - name: Build and push with timestamp and branch tag
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${{ github.ref_name }}-$TIMESTAMP"
          BRANCH_TAG="${{ github.ref_name }}"

          echo "Building and pushing image:"
          echo " - ghcr.io/${{ inputs.image-name }}:$IMAGE_TAG"
          echo " - ghcr.io/${{ inputs.image-name }}:$BRANCH_TAG"

          docker buildx build \
            --platform linux/amd64 \
            -f ${{ inputs.dockerfile }} \
            -t ghcr.io/${{ inputs.image-name }}:$IMAGE_TAG \
            -t ghcr.io/${{ inputs.image-name }}:$BRANCH_TAG \
            --push ${{ inputs.context }}
