name: Build image with buildx
on:
  workflow_call:
    inputs:
      image-name:
        description: "The name of the image to build"
        required: true
        type: string
      context:
        description: "Build context path"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-args:
        description: "Build args in format KEY=VALUE, one per line"
        required: false
        type: string
        default: ""
    secrets:
      personal_access_token:
        required: true
jobs:
  ghcr-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.personal_access_token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.personal_access_token }}
      - name: Build and push with timestamp and branch tag
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${{ github.ref_name }}-$TIMESTAMP"
          BRANCH_TAG="${{ github.ref_name }}"
          BUILD_ARGS=""
          while IFS= read -r arg; do
            [ -n "$arg" ] && BUILD_ARGS="$BUILD_ARGS --build-arg $arg"
          done <<< "${{ inputs.build-args }}"
          echo "Building and pushing image:"
          echo " - ghcr.io/${{ inputs.image-name }}:$IMAGE_TAG"
          echo " - ghcr.io/${{ inputs.image-name }}:$BRANCH_TAG"
          docker buildx build \
            --platform linux/amd64 \
            -f ${{ inputs.dockerfile }} \
            $BUILD_ARGS \
            -t ghcr.io/${{ inputs.image-name }}:$IMAGE_TAG \
            -t ghcr.io/${{ inputs.image-name }}:$BRANCH_TAG \
            --push ${{ inputs.context }}
